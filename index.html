<!DOCTYPE html>
<!--
═══════════════════════════════════════════════════════════════════
  MAKER MAP — página inicial de login e cadastro
  Autenticação: Netlify Identity (via gotrue-js). Requer o Identity
  ATIVADO no painel do Netlify (Site → Identity → Enable Identity).
  Após entrar, o usuário é levado a app.html (o mapa).
  Campos do cadastro: nome, sobrenome, e-mail, telefone, senha.
  Nome/sobrenome/telefone são salvos em user_metadata.
═══════════════════════════════════════════════════════════════════
-->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maker Map · Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gotrue-js@0.9.29/dist/gotrue.js"></script>
<style>
  :root{
    --laranja:#E04010; --magenta:#E00070; --azul:#337FFF;
    --ink:#1C1917; --ink-2:#57534E; --paper:#FFFFFF; --line:#E7E5E4; --bg:#F6F4F1;
    --ok:#0E9F6E; --erro:#D92D20;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:'Archivo',-apple-system,'Segoe UI',sans-serif;color:var(--ink);
    background:
      radial-gradient(900px 500px at 12% -10%, rgba(224,64,16,.10), transparent 60%),
      radial-gradient(900px 500px at 110% 20%, rgba(51,127,255,.10), transparent 55%),
      var(--bg);
    display:flex;align-items:center;justify-content:center;padding:24px}

  .card{width:100%;max-width:400px;background:var(--paper);border:1px solid var(--line);
    border-radius:16px;box-shadow:0 18px 50px rgba(28,25,23,.12);padding:26px 26px 22px}

  .brand{display:flex;align-items:center;gap:11px;margin-bottom:4px}
  .brand-mark{width:30px;height:30px;border-radius:7px;background:
    conic-gradient(from 45deg, var(--laranja) 0 25%, var(--magenta) 0 50%, var(--azul) 0 75%, var(--ink) 0)}
  .brand-name{font-weight:800;letter-spacing:.14em;font-size:18px}
  .sub{font-size:12.5px;color:var(--ink-2);margin:2px 0 20px}

  .tabs{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:3px;margin-bottom:18px}
  .tabs button{flex:1;border:0;background:transparent;padding:9px 0;border-radius:8px;
    font:600 13px 'Archivo',sans-serif;color:var(--ink-2);cursor:pointer}
  .tabs button.on{background:var(--paper);color:var(--ink);box-shadow:0 1px 3px rgba(28,25,23,.12)}

  form{display:none;flex-direction:column;gap:12px}
  form.on{display:flex}
  .field{display:flex;flex-direction:column;gap:5px}
  .row2{display:flex;gap:12px}
  .row2 .field{flex:1;min-width:0}
  label{font-size:11.5px;font-weight:600;color:var(--ink-2);letter-spacing:.02em}
  input{border:1px solid var(--line);border-radius:9px;padding:11px 12px;
    font:500 13.5px 'Archivo',sans-serif;color:var(--ink);background:#fff;width:100%}
  input:focus{outline:none;border-color:var(--azul);box-shadow:0 0 0 3px rgba(51,127,255,.15)}
  input::placeholder{color:#A8A29E}

  .btn{border:0;border-radius:10px;padding:13px;cursor:pointer;margin-top:4px;
    background:var(--laranja);color:#fff;font:700 14px 'Archivo',sans-serif;letter-spacing:.02em;
    box-shadow:0 8px 20px rgba(224,64,16,.30)}
  .btn:hover{filter:brightness(1.05)}
  .btn:disabled{opacity:.6;cursor:wait;box-shadow:none}

  .link{background:none;border:0;color:var(--azul);font:600 12px 'Archivo',sans-serif;
    cursor:pointer;padding:0;align-self:flex-start}
  .link:hover{text-decoration:underline}

  .msg{display:none;font-size:12.5px;line-height:1.5;border-radius:9px;padding:10px 12px;margin-bottom:2px}
  .msg.on{display:block}
  .msg.err{background:#FEF3F2;color:var(--erro);border:1px solid #FEE4E2}
  .msg.ok{background:#ECFDF3;color:var(--ok);border:1px solid #D1FADF}

  .foot{margin-top:16px;font-size:11px;color:var(--ink-2);text-align:center;line-height:1.5}
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><div class="brand-mark"></div><div class="brand-name">Maker Map</div></div>
    <div class="sub">Gestão de mapas e imagens para apresentação.</div>

    <div class="tabs">
      <button id="tabLogin" class="on">Entrar</button>
      <button id="tabSignup">Criar conta</button>
    </div>

    <div id="msg" class="msg"></div>

    <!-- LOGIN -->
    <form id="formLogin" class="on" autocomplete="on">
      <div class="field">
        <label for="liEmail">E-mail</label>
        <input type="email" id="liEmail" placeholder="voce@exemplo.com" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="liSenha">Senha</label>
        <input type="password" id="liSenha" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn" id="btnLogin">Entrar</button>
      <button type="button" class="link" id="linkForgot">Esqueci minha senha</button>
    </form>

    <!-- CADASTRO -->
    <form id="formSignup" autocomplete="on">
      <div class="row2">
        <div class="field">
          <label for="suNome">Nome</label>
          <input type="text" id="suNome" placeholder="Ana" autocomplete="given-name" required>
        </div>
        <div class="field">
          <label for="suSobrenome">Sobrenome</label>
          <input type="text" id="suSobrenome" placeholder="Silva" autocomplete="family-name" required>
        </div>
      </div>
      <div class="field">
        <label for="suEmail">E-mail</label>
        <input type="email" id="suEmail" placeholder="voce@exemplo.com" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="suTel">Telefone</label>
        <input type="tel" id="suTel" placeholder="(11) 99999-9999" autocomplete="tel" required>
      </div>
      <div class="field">
        <label for="suSenha">Senha</label>
        <input type="password" id="suSenha" placeholder="mínimo 6 caracteres" autocomplete="new-password" minlength="6" required>
      </div>
      <button type="submit" class="btn" id="btnSignup">Criar conta</button>
    </form>

    <!-- NOVA SENHA (fluxo de recuperação) -->
    <form id="formRecover" autocomplete="off">
      <div class="field">
        <label for="rcSenha">Nova senha</label>
        <input type="password" id="rcSenha" placeholder="mínimo 6 caracteres" autocomplete="new-password" minlength="6" required>
      </div>
      <button type="submit" class="btn" id="btnRecover">Salvar nova senha</button>
    </form>

    <div class="foot">Ao continuar você acessa o painel do Maker Map.</div>
  </div>

<script>
  var auth = new GoTrue({ APIUrl: location.origin + '/.netlify/identity', setCookie: true });
  var APP = 'app.html';

  var el = function(id){ return document.getElementById(id); };
  var msg = el('msg');
  function show(text, kind){
    msg.textContent = text;
    msg.className = 'msg on ' + (kind === 'ok' ? 'ok' : 'err');
  }
  function clearMsg(){ msg.className = 'msg'; }
  function msgOf(err){
    if(!err) return 'Não foi possível concluir. Tente novamente.';
    if(err.json && (err.json.error_description || err.json.msg)) return err.json.error_description || err.json.msg;
    if(err.message) return err.message;
    try{ return JSON.stringify(err); }catch(e){ return String(err); }
  }
  // Mensagens comuns do gotrue traduzidas
  function humano(err){
    var m = (msgOf(err) || '').toLowerCase();
    if(/invalid|no user|not found|credentials/.test(m)) return 'E-mail ou senha incorretos.';
    if(/email not confirmed|confirm/.test(m)) return 'Confirme seu e-mail pelo link que enviamos e depois entre.';
    if(/already (been )?registered|already exists|duplicate/.test(m)) return 'Este e-mail já tem cadastro. Use "Entrar".';
    if(/password/.test(m) && /short|least|6/.test(m)) return 'A senha precisa de pelo menos 6 caracteres.';
    if(/failed to fetch|networkerror|identity/.test(m)) return 'Não foi possível falar com o servidor de login. O Netlify Identity está ativado neste site?';
    return msgOf(err);
  }

  // ── Abas ──
  var forms = { login: el('formLogin'), signup: el('formSignup'), recover: el('formRecover') };
  function mostrarForm(nome){
    Object.keys(forms).forEach(function(k){ forms[k].classList.toggle('on', k === nome); });
    el('tabLogin').classList.toggle('on', nome === 'login');
    el('tabSignup').classList.toggle('on', nome === 'signup');
  }
  el('tabLogin').onclick = function(){ clearMsg(); mostrarForm('login'); };
  el('tabSignup').onclick = function(){ clearMsg(); mostrarForm('signup'); };

  // Se já estiver logado, vai direto para o app
  if(auth.currentUser()){ location.replace(APP); }

  // ── Login ──
  el('formLogin').addEventListener('submit', function(e){
    e.preventDefault();
    clearMsg();
    var b = el('btnLogin'); b.disabled = true; b.textContent = 'Entrando…';
    auth.login(el('liEmail').value.trim(), el('liSenha').value, true)
      .then(function(){ location.href = APP; })
      .catch(function(err){ show(humano(err), 'err'); })
      .then(function(){ b.disabled = false; b.textContent = 'Entrar'; });
  });

  // ── Cadastro ──
  el('formSignup').addEventListener('submit', function(e){
    e.preventDefault();
    clearMsg();
    var nome = el('suNome').value.trim();
    var sobrenome = el('suSobrenome').value.trim();
    var email = el('suEmail').value.trim();
    var tel = el('suTel').value.trim();
    var senha = el('suSenha').value;
    var b = el('btnSignup'); b.disabled = true; b.textContent = 'Criando…';
    auth.signup(email, senha, {
        first_name: nome,
        last_name: sobrenome,
        full_name: (nome + ' ' + sobrenome).trim(),
        phone: tel
      })
      .then(function(){
        // Tenta entrar direto (funciona se a confirmação por e-mail estiver desativada)
        return auth.login(email, senha, true);
      })
      .then(function(){ location.href = APP; })
      .catch(function(err){
        var m = (msgOf(err) || '').toLowerCase();
        if(/confirm/.test(m)){
          show('Cadastro criado! Enviamos um e-mail de confirmação para ' + email + '. Confirme pelo link e depois entre.', 'ok');
          mostrarForm('login');
          el('liEmail').value = email;
        } else {
          show(humano(err), 'err');
        }
      })
      .then(function(){ b.disabled = false; b.textContent = 'Criar conta'; });
  });

  // ── Esqueci a senha ──
  el('linkForgot').onclick = function(){
    clearMsg();
    var email = el('liEmail').value.trim();
    if(!email){ show('Digite seu e-mail no campo acima e clique novamente em "Esqueci minha senha".', 'err'); el('liEmail').focus(); return; }
    auth.requestPasswordRecovery(email)
      .then(function(){ show('Se houver conta para ' + email + ', enviamos um link para redefinir a senha.', 'ok'); })
      .catch(function(err){ show(humano(err), 'err'); });
  };

  // ── Nova senha (após clicar no link de recuperação) ──
  var recoveredUser = null;
  el('formRecover').addEventListener('submit', function(e){
    e.preventDefault();
    if(!recoveredUser){ show('Link de recuperação inválido ou expirado. Peça um novo em "Esqueci minha senha".', 'err'); return; }
    var b = el('btnRecover'); b.disabled = true; b.textContent = 'Salvando…';
    recoveredUser.update({ password: el('rcSenha').value })
      .then(function(){ location.href = APP; })
      .catch(function(err){ show(humano(err), 'err'); b.disabled = false; b.textContent = 'Salvar nova senha'; });
  });

  // ── Trata tokens vindos no link do e-mail (#confirmation_token / #recovery_token) ──
  (function tratarHash(){
    var raw = (location.hash || '').replace(/^#\/?/, '');
    if(!raw) return;
    var params = new URLSearchParams(raw);
    var conf = params.get('confirmation_token');
    var rec = params.get('recovery_token');
    // limpa o hash da barra de endereços
    if(history.replaceState) history.replaceState(null, '', location.pathname + location.search);

    if(conf){
      auth.confirm(conf, true)
        .then(function(){ location.href = APP; })
        .catch(function(err){ show('Não foi possível confirmar o e-mail: ' + humano(err), 'err'); });
    } else if(rec){
      auth.recover(rec, true)
        .then(function(user){ recoveredUser = user; mostrarForm('recover'); show('Defina uma nova senha para sua conta.', 'ok'); })
        .catch(function(err){ show('Link de recuperação inválido ou expirado: ' + humano(err), 'err'); });
    }
  })();
</script>
</body>
</html>
